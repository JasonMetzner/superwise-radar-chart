<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SUPERWISE Use‑Case Radar Chart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Font for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <!-- Chart.js from CDN to handle the radar chart rendering -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.2/dist/chart.umd.min.js"></script>
    <!-- html2canvas and jsPDF for exporting to PDF -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <style>
        /* CSS custom properties define colours for light and dark modes */
        :root {
            --bg-color: #0B161D;
            --text-color: #E1E7EA;
            --secondary-text: #A5B5C3;
            --panel-bg: #101F2B;
            --border-color: #243441;
            --header-color: #657E93;
            --divider-color: #E64050;
            --table-header-bg: #152A3D;
            --table-row-bg: #0F2130;
            --input-bg: #1F2E3A;
            --button-bg: #E64050;
            --button-hover-bg: #F05260;
        }
        [data-theme="light"] {
            --bg-color: #F6F8FA;
            --text-color: #1A1A1A;
            /* In light mode make all text colours dark. Use the same dark hue for
               primary, secondary and header text variables so that every piece of text
               becomes black or near‑black when toggled. */
            --secondary-text: #1A1A1A;
            --panel-bg: #FFFFFF;
            --border-color: #D0D7DE;
            --header-color: #1A1A1A;
            --divider-color: #E13C46;
            --table-header-bg: #EEF3F9;
            --table-row-bg: #F9FBFC;
            --input-bg: #FFFFFF;
            --button-bg: #E64050;
            --button-hover-bg: #F05260;
        }
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        .wrapper {
            max-width: 1200px;
            margin: auto;
            padding: 40px 20px;
        }
        .header {
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: var(--header-color);
            font-size: 28px;
            text-align: left;
            margin-bottom: 5px;
        }
        .divider {
            width: 150px;
            height: 4px;
            background-color: var(--divider-color);
            margin-bottom: 30px;
        }
        .content {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
        }
        #radar-container,
        #edit-container {
            flex: 1 1 400px;
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th,
        td {
            border: 1px solid var(--border-color);
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: var(--table-header-bg);
            color: var(--text-color);
        }
        td {
            background-color: var(--table-row-bg);
        }
        td input[type='number'] {
            width: 80px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 4px;
            border-radius: 4px;
        }
        td[contenteditable="true"] {
            cursor: text;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: var(--button-bg);
            color: #fff;
            text-transform: uppercase;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
            margin-top: 10px;
        }
        .button:hover {
            background-color: var(--button-hover-bg);
        }
        .logo {
            width: 160px;
            margin-top: 40px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header">Superwise Radar Chart</div>
        <div class="divider"></div>
        <div class="content">
            <!-- Container for the radar chart -->
            <div id="radar-container">
                <canvas id="radarChart" width="400" height="400"></canvas>
            </div>
            <!-- Editing panel -->
            <div id="edit-container">
                <!-- Use CSS variables for colours so they update with the light/dark theme. The header
                     colour is drawn from --header-color and the subtext uses --secondary-text. -->
                <h2 style="color: var(--header-color); margin-top: 0; font-size: 20px;">Edit Data</h2>
                <p style="font-size: 14px; line-height: 1.4; color: var(--secondary-text);">Change the category names, use‑case names, or values below to customise the chart. Values should be between 0 and 10.</p>
                <div style="overflow:auto; max-height:400px;">
                    <table id="data-table">
                        <!-- Dynamic content will be generated by script -->
                    </table>
                </div>
                <button id="add-category" class="button">Add Category</button>
                <button id="add-usecase" class="button">Add Use Case</button>
                <button id="download-data" class="button">Download Data</button>
                <button id="download-pdf" class="button">Download PDF</button>
                <button id="toggle-theme" class="button">Switch to Light Mode</button>
            </div>
        </div>

    </div>
    <script>
        // Initial lists for categories, use cases and values. These are editable.
        let categories = [
            "Data Security & Compliance",
            "Collaboration Level",
            "Customisable Agents",
            "Knowledge & Document Mgmt",
            "Multi‑Agent Complexity",
            "SSO & Domains"
        ];
        let useCases = [
            "Replace ChatGPT",
            "Team Collaboration",
            "Multi‑Agent Workflows",
            "Department Hubs",
            "Sales Pursuit",
            "Customer Delivery"
        ];
        // Each inner array corresponds to values per category for a given use case
        let values = [
            [5, 2, 1, 2, 1, 1],
            [5, 5, 2, 5, 2, 2],
            [5, 4, 5, 3, 5, 3],
            [5, 3, 3, 4, 3, 5],
            [5, 4, 3, 5, 3, 5],
            [5, 4, 3, 5, 2, 3]
        ];
        // Colour palette used for each use case line. Extended if more use cases are added.
        const datasetColors = [
            "#2C8CCA",
            "#F38B25",
            "#4B876B",
            "#6F2C7B",
            "#E13C46",
            "#AE504A",
            "#71B3B5",
            "#B48FCA"
        ];

        let chart = null;

        // Build the editable table from current data
        function buildTable() {
            const table = document.getElementById('data-table');
            table.innerHTML = '';
            // Header
            const headerRow = document.createElement('tr');
            const corner = document.createElement('th');
            corner.textContent = 'Category / Use Case';
            headerRow.appendChild(corner);
            useCases.forEach((uc, idx) => {
                const th = document.createElement('th');
                th.contentEditable = true;
                th.textContent = uc;
                th.dataset.type = 'usecase';
                th.dataset.index = idx;
                th.addEventListener('blur', updateUseCaseName);
                headerRow.appendChild(th);
            });
            const thead = document.createElement('thead');
            thead.appendChild(headerRow);
            table.appendChild(thead);
            // Body
            const tbody = document.createElement('tbody');
            categories.forEach((cat, catIndex) => {
                const row = document.createElement('tr');
                // Category cell
                const tdCat = document.createElement('td');
                tdCat.contentEditable = true;
                tdCat.textContent = cat;
                tdCat.dataset.type = 'category';
                tdCat.dataset.index = catIndex;
                tdCat.addEventListener('blur', updateCategoryName);
                row.appendChild(tdCat);
                // Values for each use case
                useCases.forEach((uc, useIndex) => {
                    const td = document.createElement('td');
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.min = 0;
                    input.max = 10;
                    input.step = 1;
                    input.value = values[useIndex][catIndex];
                    input.dataset.useIndex = useIndex;
                    input.dataset.catIndex = catIndex;
                    input.addEventListener('change', updateValue);
                    td.appendChild(input);
                    row.appendChild(td);
                });
                tbody.appendChild(row);
            });
            table.appendChild(tbody);
        }

        // Update use case name in data array
        function updateUseCaseName(event) {
            const idx = parseInt(event.target.dataset.index);
            useCases[idx] = event.target.textContent.trim() || 'Untitled';
            updateChart();
        }
        // Update category name in data array
        function updateCategoryName(event) {
            const idx = parseInt(event.target.dataset.index);
            categories[idx] = event.target.textContent.trim() || 'Untitled';
            updateChart();
        }
        // Update value on change
        function updateValue(event) {
            const useIndex = parseInt(event.target.dataset.useIndex);
            const catIndex = parseInt(event.target.dataset.catIndex);
            let v = parseFloat(event.target.value);
            if (isNaN(v) || v < 0) v = 0;
            if (v > 10) v = 10;
            values[useIndex][catIndex] = v;
            updateChart();
        }
        // Add a new category (axis)
        function addCategory() {
            const newCatName = prompt('Enter name for new category:');
            if (!newCatName) return;
            categories.push(newCatName);
            // Add default zero for each use case
            values.forEach(row => row.push(0));
            buildTable();
            updateChart();
        }
        // Add a new use case (dataset)
        function addUseCase() {
            const newUseName = prompt('Enter name for new use case:');
            if (!newUseName) return;
            useCases.push(newUseName);
            // Extend colour palette if necessary
            if (datasetColors.length < useCases.length) {
                datasetColors.push('#' + Math.floor(Math.random() * 16777215).toString(16));
            }
            // Add new row values with zeros for each category
            const newRow = categories.map(() => 0);
            values.push(newRow);
            buildTable();
            updateChart();
        }
        // Download the current data as JSON
        function downloadData() {
            const dataObj = {
                categories: categories,
                useCases: useCases,
                values: values
            };
            const dataStr = JSON.stringify(dataObj, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'superwise_radar_chart_data.json';
            a.click();
            URL.revokeObjectURL(url);
        }
        // Convert hex colour to rgba with given alpha
        function hexToRgba(hex, alpha) {
            let r = 0, g = 0, b = 0;
            if (hex.length == 4) {
                r = '0x' + hex[1] + hex[1];
                g = '0x' + hex[2] + hex[2];
                b = '0x' + hex[3] + hex[3];
            } else if (hex.length == 7) {
                r = '0x' + hex[1] + hex[2];
                g = '0x' + hex[3] + hex[4];
                b = '0x' + hex[5] + hex[6];
            }
            return `rgba(${+r},${+g},${+b},${alpha})`;
        }
        // Render or update the radar chart
        function updateChart() {
            const ctx = document.getElementById('radarChart').getContext('2d');
            // Get current computed styles to adapt chart colours to theme
            const styles = getComputedStyle(document.documentElement);
            const axisColour = styles.getPropertyValue('--border-color').trim() || '#243441';
            // Determine base colours from CSS variables. If the current theme is light we
            // override the text and secondary colours to ensure chart labels, ticks and
            // legends render in a true black hue. This avoids residual grey tones when
            // toggling from dark to light mode.
            let textColour = styles.getPropertyValue('--text-color').trim() || '#E1E7EA';
            let secondaryColour = styles.getPropertyValue('--secondary-text').trim() || '#A5B5C3';
            const panelBg = styles.getPropertyValue('--panel-bg').trim() || '#101F2B';
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'light') {
                textColour = '#1A1A1A';
                secondaryColour = '#1A1A1A';
            }

            const datasets = useCases.map((uc, idx) => {
                return {
                    label: uc,
                    data: values[idx],
                    borderColor: datasetColors[idx % datasetColors.length],
                    backgroundColor: hexToRgba(datasetColors[idx % datasetColors.length], 0.2),
                    pointBackgroundColor: datasetColors[idx % datasetColors.length],
                    pointBorderColor: '#fff',
                    pointHoverBorderColor: datasetColors[idx % datasetColors.length]
                };
            });
            if (chart) {
                chart.data.labels = categories;
                chart.data.datasets = datasets;
                // Update theme-dependent colours
                chart.options.plugins.legend.labels.color = textColour;
                chart.options.plugins.title.color = textColour;
                chart.options.scales.r.angleLines.color = axisColour;
                chart.options.scales.r.grid.color = axisColour;
                chart.options.scales.r.pointLabels.color = textColour;
                chart.options.scales.r.ticks.backdropColor = panelBg;
                chart.options.scales.r.ticks.color = secondaryColour;
                chart.update();
            } else {
                chart = new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: categories,
                        datasets: datasets
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'top',
                                labels: {
                                    color: textColour
                                }
                            },
                            title: {
                                display: true,
                                text: 'SUPERWISE Use‑Case Comparison',
                                color: textColour,
                                font: { size: 18 }
                            }
                        },
                        scales: {
                            r: {
                                angleLines: { color: axisColour },
                                grid: { color: axisColour },
                                pointLabels: { color: textColour, font: { size: 12 } },
                                ticks: {
                                    backdropColor: panelBg,
                                    color: secondaryColour,
                                    beginAtZero: true,
                                    max: 10,
                                    stepSize: 1,
                                    showLabelBackdrop: false
                                }
                            }
                        }
                    }
                });
            }
        }
        // Hook up buttons
        document.getElementById('add-category').addEventListener('click', addCategory);
        document.getElementById('add-usecase').addEventListener('click', addUseCase);
        document.getElementById('download-data').addEventListener('click', downloadData);
        document.getElementById('download-pdf').addEventListener('click', downloadPDF);
        document.getElementById('toggle-theme').addEventListener('click', toggleTheme);
        // Initial render
        buildTable();
        updateChart();

        // Theme initialisation: restore from local storage or default to dark
        const savedTheme = localStorage.getItem('superwise-theme');
        if (savedTheme === 'light') {
            // Apply the stored light theme
            document.documentElement.setAttribute('data-theme', 'light');
            document.getElementById('toggle-theme').textContent = 'Switch to Dark Mode';
            // Rerender the chart so that axis, legend and ticks use light‑theme colours
            updateChart();
        }

        /**
         * Toggle between light and dark mode.
         * Updates the data-theme attribute on the document element and
         * persists the choice in localStorage. Also updates the button label.
         */
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            if (current === 'light') {
                // Switch from light to dark mode
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('superwise-theme', 'dark');
                document.getElementById('toggle-theme').textContent = 'Switch to Light Mode';
                // After toggling, refresh chart colours to align with dark theme
                updateChart();
            } else {
                // Switch from dark to light mode
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('superwise-theme', 'light');
                document.getElementById('toggle-theme').textContent = 'Switch to Dark Mode';
                // After toggling, refresh chart colours to align with light theme
                updateChart();
            }
        }

        /**
         * Export the radar chart and editing panel to a single PDF file.
         * Uses html2canvas to capture screenshots and jsPDF to assemble them.
         */
        async function downloadPDF() {
            /*
             * Export only the radar chart panel to a single page PDF.  Instead of rendering the
             * entire wrapper, we capture the radar container using html2canvas and embed that
             * image into a new jsPDF document.  This ensures the exported PDF consists of one
             * page containing just the chart without the editing panel or other page elements.
             */
            const { jsPDF } = window.jspdf;
            // Create a new PDF document in portrait orientation on A4 paper
            const pdf = new jsPDF('p', 'mm', 'a4');
            // Select the radar container which wraps the chart canvas and background
            const radarEl = document.querySelector('#radar-container');
            // Use html2canvas to rasterise the chart panel at a higher scale for clarity
            const canvas = await html2canvas(radarEl, { scale: 3 });
            // Convert canvas to PNG data URL
            const imgData = canvas.toDataURL('image/png');
            // Determine the maximum width and height available inside the PDF page
            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();
            // Set margins (10mm on both horizontal sides) and compute scaled image size
            const margin = 10;
            const availableWidth = pageWidth - margin * 2;
            // Maintain aspect ratio of the captured chart
            const imgAspectRatio = canvas.height / canvas.width;
            const imgWidth = availableWidth;
            const imgHeight = availableWidth * imgAspectRatio;
            // If image height exceeds page height minus vertical margins, scale down
            let finalHeight = imgHeight;
            let finalWidth = imgWidth;
            if (imgHeight > pageHeight - margin * 2) {
                finalHeight = pageHeight - margin * 2;
                finalWidth = finalHeight / imgAspectRatio;
            }
            // Center the image vertically on the page
            const yPosition = (pageHeight - finalHeight) / 2;
            // Add the image to the PDF and save
            pdf.addImage(imgData, 'PNG', (pageWidth - finalWidth) / 2, yPosition, finalWidth, finalHeight);
            pdf.save('superwise_chart.pdf');
        }
    </script>
